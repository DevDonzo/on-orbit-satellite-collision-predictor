name: Auto Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  enable-auto-merge:
    name: Enable Auto Merge for AI Agent PRs
    runs-on: ubuntu-latest
    if: github.actor == 'github-actions[bot]' || contains(github.event.pull_request.labels.*.name, 'ai-agent') || contains(github.head_ref, 'feature/') || contains(github.head_ref, 'fix/')
    steps:
      - name: Enable auto-merge for this PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
