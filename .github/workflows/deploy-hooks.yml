name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frontend deploy hook if configured
        env:
          FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "FRONTEND_DEPLOY_HOOK_URL not set; skipping."
            exit 0
          fi
          curl --fail --show-error --silent -X POST "$FRONTEND_DEPLOY_HOOK_URL"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy hook if configured
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "BACKEND_DEPLOY_HOOK_URL not set; skipping."
            exit 0
          fi
          curl --fail --show-error --silent -X POST "$BACKEND_DEPLOY_HOOK_URL"
